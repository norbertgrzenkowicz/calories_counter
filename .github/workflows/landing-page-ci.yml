name: Landing Page CI

on:
  pull_request:
    branches: [main]
    paths:
      - "landing_page/**"

jobs:
  check:
    name: Type check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing_page

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build
